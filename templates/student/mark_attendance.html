<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <title>Mark Attendance</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <style>

        body {

            background:
            linear-gradient(
                135deg,
                #2563eb,
                #1e3a8a
            );

            min-height: 100vh;

            display: flex;

            align-items: center;

            justify-content: center;
        }

        .attendance-card {

            background: white;

            padding: 40px;

            border-radius: 20px;

            width: 450px;

            box-shadow:
            0 10px 30px rgba(0,0,0,0.2);
        }

        .code-input {

            height: 60px;

            font-size: 28px;

            text-align: center;

            letter-spacing: 8px;

            font-weight: bold;
        }

    </style>

</head>
<body>

<div class="attendance-card">

   <h2 class="mb-3 text-center">

    Mark Attendance

    </h2>

    <p class="text-center text-muted mb-4">

        Current Session:
        <strong>
            {{ subject_name }}
        </strong>

    </p>
    <form
        method="POST"
        action="/student/attendance/mark"
    >

        <div class="mb-4">

            <label class="mb-2">

                Enter Attendance Code

            </label>

            <input
                type="text"
                name="code"
                class="form-control code-input"
                placeholder="X7P91"
                required
            >

        </div>

        <button class="btn btn-primary w-100 btn-lg">

            Submit Attendance

        </button>

    </form>

</div>

</body>
</html>
