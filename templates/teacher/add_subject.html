<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <title>Add Subject</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-5">

            <div class="card shadow p-4">

                <h2 class="mb-4">
                    Add Subject
                </h2>

                <form method="POST">

                    <div class="mb-4">

                        <label>
                            Subject Name
                        </label>

                        <input
                            type="text"
                            name="subject_name"
                            class="form-control"
                            placeholder="Database Management System"
                            required
                        >

                    </div>

                    <button class="btn btn-primary w-100">

                        Add Subject

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

</body>
</html>
