<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <title>Edit Student</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow p-4">

                <h2 class="mb-4">
                    Edit Student
                </h2>

                <form method="POST">

                    <div class="mb-3">

                        <label>Name</label>

                        <input
                            type="text"
                            name="name"
                            value="{{ student[1] }}"
                            class="form-control"
                            required
                        >

                    </div>

                    <div class="mb-3">

                        <label>Branch</label>

                        <input
                            type="text"
                            name="branch"
                            value="{{ student[3] }}"
                            class="form-control"
                            required
                        >

                    </div>

                    <div class="mb-3">

                        <label>Semester</label>

                        <input
                            type="number"
                            name="semester"
                            value="{{ student[4] }}"
                            class="form-control"
                            required
                        >

                    </div>

                    <div class="mb-4">

                        <label>Email</label>

                        <input
                            type="email"
                            name="email"
                            value="{{ student[5] }}"
                            class="form-control"
                            required
                        >

                    </div>

                    <button class="btn btn-success w-100">
                        Update Student
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

</body>
</html>
