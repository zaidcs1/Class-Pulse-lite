<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <title>Add Student</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow p-4">

                <h2 class="mb-4">
                    Add Student
                </h2>

                <form method="POST">

                    <div class="mb-3">
                        <label>Roll Number</label>
                        <input
                            type="text"
                            name="roll_no"
                            class="form-control"
                            placeholder="04-CSE-2024"
                            required
                        >
                    </div>

                    <div class="mb-3">
                        <label>Name</label>
                        <input
                            type="text"
                            name="name"
                            class="form-control"
                            required
                        >
                    </div>

                    <div class="mb-3">
                        <label>Password</label>
                        <input
                            type="password"
                            name="password"
                            class="form-control"
                            required
                        >
                    </div>

                    <div class="mb-3">
                        <label>Branch</label>
                        <input
                            type="text"
                            name="branch"
                            class="form-control"
                            required
                        >
                    </div>

                    <div class="mb-3">
                        <label>Semester</label>
                        <input
                            type="number"
                            name="semester"
                            class="form-control"
                            required
                        >
                    </div>

                    <div class="mb-4">
                        <label>Email</label>
                        <input
                            type="email"
                            name="email"
                            class="form-control"
                            required
                        >
                    </div>

                    <button class="btn btn-primary w-100">
                        Add Student
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

</body>
</html>
