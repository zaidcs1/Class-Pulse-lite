<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <title>Attendance Sessions</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow p-5">

                <h2 class="mb-4">
                    Start Attendance Session
                </h2>

                <form
                    method="POST"
                    action="/teacher/attendance/create"
                >

                    <div class="mb-4">

                        <label>
                            Select Subject
                        </label>

                        <select
                            name="subject_id"
                            class="form-select"
                            required
                        >

                            {% for subject in subjects %}

                            <option
                                value="{{ subject[0] }}"
                            >
                                {{ subject[1] }}
                            </option>

                            {% endfor %}

                        </select>

                    </div>

                    <button class="btn btn-primary w-100">

                        Generate Attendance Code

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

</body>
</html>
