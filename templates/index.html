<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Class Pulse</title>

    <!-- Bootstrap -->

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- Font Awesome -->

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    >

    <style>

        body {

            background:
            linear-gradient(
                135deg,
                #1e3a8a,
                #2563eb
            );

            min-height: 100vh;

            display: flex;

            align-items: center;

            justify-content: center;

            overflow-x: hidden;
        }

        .main-card {

            background: white;

            border-radius: 25px;

            padding: 50px;

            box-shadow:
            0 15px 40px rgba(0,0,0,0.2);
        }

        .logo {

            font-size: 60px;

            color: #2563eb;

            margin-bottom: 20px;
        }

        .title {

            font-size: 42px;

            font-weight: bold;

            color: #111827;
        }

        .subtitle {

            color: #6b7280;

            margin-bottom: 40px;
        }

        .option-card {

            border: none;

            border-radius: 18px;

            padding: 25px;

            transition: 0.3s;

            box-shadow:
            0 5px 15px rgba(0,0,0,0.08);
        }

        .option-card:hover {

            transform: translateY(-6px);
        }

        .option-icon {

            font-size: 40px;

            margin-bottom: 15px;
        }

        .teacher-icon {

            color: #2563eb;
        }

        .student-icon {

            color: #059669;
        }

        .btn-custom {

            border-radius: 12px;

            font-weight: bold;

            padding: 10px;
        }

    </style>

</head>
<body>

<div class="container">

    <div class="row justify-content-center">

        <div class="col-lg-10">

            <div class="main-card">

                <div class="text-center">

                    <div class="logo">
                        <i class="fa-solid fa-graduation-cap"></i>
                    </div>

                    <h1 class="title">
                        Class Pulse
                    </h1>

                    <p class="subtitle">

                        Smart Attendance Management System

                    </p>

                </div>

                <div class="row g-4">

                    <!-- Teacher -->

                    <div class="col-md-6">

                        <div class="option-card text-center h-100">

                            <div class="option-icon teacher-icon">

                                <i class="fa-solid fa-chalkboard-user"></i>

                            </div>

                            <h3>
                                Teacher Portal
                            </h3>

                            <p class="text-muted">

                                Manage students, subjects,
                                attendance sessions and reports.

                            </p>

                            <div class="d-grid gap-2">

                                <a
                                    href="/teacher/login"
                                    class="btn btn-primary btn-custom"
                                >
                                    Teacher Login
                                </a>

                                <a
                                    href="/teacher/register"
                                    class="btn btn-outline-primary btn-custom"
                                >
                                    Teacher Register
                                </a>

                            </div>

                        </div>

                    </div>

                    <!-- Student -->

                    <div class="col-md-6">

                        <div class="option-card text-center h-100">

                            <div class="option-icon student-icon">

                                <i class="fa-solid fa-user-graduate"></i>

                            </div>

                            <h3>
                                Student Portal
                            </h3>

                            <p class="text-muted">

                                Mark attendance, track analytics,
                                and monitor attendance percentage.

                            </p>

                            <div class="d-grid gap-2">

                                <a
                                    href="/student/login"
                                    class="btn btn-success btn-custom"
                                >
                                    Student Login
                                </a>

                                <a
                                    href="/student/register"
                                    class="btn btn-outline-success btn-custom"
                                >
                                    Student Register
                                </a>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
