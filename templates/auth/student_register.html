<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Student Register | Class Pulse</title>

    <!-- Bootstrap -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- Font Awesome -->
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    >

    <style>

        body {
            background: linear-gradient(to right, #2563eb, #1e3a8a);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .register-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .title {
            font-weight: bold;
            color: #111827;
        }

        .subtitle {
            color: #6b7280;
            margin-bottom: 25px;
        }

        .form-control {
            height: 50px;
            border-radius: 12px;
        }

        .btn-register {
            background: #2563eb;
            border: none;
            height: 50px;
            border-radius: 12px;
            font-weight: bold;
        }

        .btn-register:hover {
            background: #1d4ed8;
        }

        .logo {
            font-size: 45px;
            color: #2563eb;
            margin-bottom: 15px;
        }

        .login-link {
            text-decoration: none;
        }

    </style>

</head>
<body>

<div class="container">

    <div class="row justify-content-center">

        <div class="col-md-6 col-lg-5">

            <div class="register-card">

                <div class="text-center">

                    <div class="logo">
                        <i class="fa-solid fa-user-graduate"></i>
                    </div>

                    <h2 class="title">
                        Student Registration
                    </h2>

                    <p class="subtitle">
                        Create your Class Pulse account
                    </p>

                </div>

                <form method="POST">

                    <div class="mb-3">

                        <label class="form-label">
                            Roll Number
                        </label>

                        <input
                            type="text"
                            name="roll_no"
                            class="form-control"
                            placeholder="04-CSE-2024"
                            required
                        >

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Full Name
                        </label>

                        <input
                            type="text"
                            name="name"
                            class="form-control"
                            placeholder="Enter full name"
                            required
                        >

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Password
                        </label>

                        <input
                            type="password"
                            name="password"
                            class="form-control"
                            placeholder="Enter password"
                            required
                        >

                    </div>

                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Branch
                            </label>

                            <input
                                type="text"
                                name="branch"
                                class="form-control"
                                placeholder="CSE"
                                required
                            >

                        </div>

                        <div class="col-md-6 mb-3">

                            <label class="form-label">
                                Semester
                            </label>

                            <input
                                type="number"
                                name="semester"
                                class="form-control"
                                placeholder="3"
                                required
                            >

                        </div>

                    </div>

                    <div class="mb-4">

                        <label class="form-label">
                            Email Address
                        </label>

                        <input
                            type="email"
                            name="email"
                            class="form-control"
                            placeholder="example@classpulse.com"
                            required
                        >

                    </div>

                    <button
                        type="submit"
                        class="btn btn-primary btn-register w-100"
                    >
                        Register Student
                    </button>

                </form>

                <div class="text-center mt-4">

                    <p>

                        Already have an account?

                        <a
                            href="/student/login"
                            class="login-link"
                        >
                            Login Here
                        </a>

                    </p>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
